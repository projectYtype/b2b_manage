    const STORAGE_KEY = 'b2b_matching_events_db_v4';
    const CURRENT_ID_KEY = 'b2b_matching_current_id_v4';

    const GAS_URL ='https://script.google.com/macros/s/AKfycbxO3gHGZbsBmjaX-hfFHP-s7trR6OEKj_Rw-3G5-B0ehMOC3JTl1h2r7rEF8M3XmsqO/exec';
    const LOG_GAS_URL = 'https://script.google.com/macros/s/AKfycbysxK0dstH8fLOOoctqaix404KNjOktAOMQ7oWUwv6bAQR58EBk48tzOAzk5Wee82ryEQ/exec';

        👈 표를 좌우로 스크롤하여 전체 내용을 확인하세요 👉
      </div>
    );

    function App() {
      const getToday = () => new Date().toISOString().split('T')[0];
      
      // 💡 [수정됨] 행사 데이터만 분리 저장 (action: 'save_events')
      const forceSaveToCloud = (targetDB) => {
        if (isCloudEnabled) return;
        const payload = { action: 'save_events', data: targetDB };
        fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          redirect: 'follow',
          body: JSON.stringify(payload)
        })
        .then(res => res.text())
        .then(txt => { if(txt !== "success_events") console.error("행사 저장 실패 응답:", txt); })
        .catch(err => {
          console.error("네트워크 오류 또는 타임아웃:", err);
          showAlert('저장 확인 필요', '서버 저장 중 오류가 발생했습니다. 네트워크 연결을 확인하거나 백업 파일(JSON)을 PC에 저장해두세요.');
        });
      };
      
      // 모달/알림 관리
      const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: null });
      const showAlert = (title, message) => setDialog({ isOpen: true, type: 'alert', title, message, onConfirm: null });
      const showConfirm = (title, message, onConfirm) => setDialog({ isOpen: true, type: 'confirm', title, message, onConfirm });
      const closeDialog = () => setDialog(prev => ({ ...prev, isOpen: false }));

      // --- 계정 및 로그인 상태 ---
      const [loginUser, setLoginUser] = useState(() => {
          if (localStorage.getItem('b2b_v2_auto_login') === 'true') {
              const session = localStorage.getItem('b2b_v2_user_session');
              return session ? JSON.parse(session) : null;
          }
          return null;
      });
      const [rememberId, setRememberId] = useState(() => localStorage.getItem('b2b_v2_remember_id') === 'true');
      const [autoLogin, setAutoLogin] = useState(() => localStorage.getItem('b2b_auto_login') === 'true');
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState(() => {
          if (localStorage.getItem('b2b_auto_login') === 'true') {
              const session = localStorage.getItem('b2b_user_session');
              const u = session ? JSON.parse(session) : null;
              if (u && u.role === 'client') return 'stats';
              if (u && u.role === 'interpreter') return 'interpreter_schedule';
          }
          return 'setup';
      });
      
      const [accountsDB, setAccountsDB] = useState([]);
      const accountsRef = useRef([]);
      const [loginInput, setLoginInput] = useState({ 
          id: localStorage.getItem('b2b_remember_id') === 'true' ? (localStorage.getItem('b2b_v2_saved_id') || '') : '', 
          pw: '' 
      });
      const [loginError, setLoginError] = useState('');

      const [myPwModal, setMyPwModal] = useState({ isOpen: false, newPw: '' });
      // [수정] 아이디/비밀번호 모두 수정 가능한 모달 상태
      const [editAccModal, setEditAccModal] = useState({ isOpen: false, oldUsername: '', newUsername: '', newPw: '' });
      
      // 💡 [에러 해결!] 빠져있던 비밀번호 전용 수정 모달 상태값을 복구했습니다.
      const [editPwAccModal, setEditPwAccModal] = useState({ isOpen: false, username: '', newPw: '' });

      // [추가] 계정 다중 선택 상태
      const [selectedAccountIds, setSelectedAccountIds] = useState([]);

      // 💡 [수정됨] 계정 데이터만 따로 분리 저장 (action: 'save_accounts')
      const saveAccounts = (newAccounts) => {
          setAccountsDB(newAccounts);
          accountsRef.current = newAccounts;
          if (isCloudEnabled && user) {
              setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'events', '__accounts'), { list: newAccounts }).catch(console.error);
          } else {
              const payload = { action: 'save_accounts', data: newAccounts };
              fetch(GAS_URL, { 
                  method: 'POST', 
                  headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                  redirect: 'follow', 
                  body: JSON.stringify(payload) 
              })
              .then(res => res.text())
              .then(txt => { if(txt !== "success_accounts") console.error("계정 저장 실패 응답:", txt); })
              .catch(console.error);
          }
      };

      // --- 모든 행사 데이터를 관리하는 메모리 저장소 ---
      const [eventsDB, setEventsDB] = useState({});

      });

      const [buyers, setBuyers] = useState([]);
      const [matches, setMatches] = useState({ 0: {} });
      
      const [walkInMatches, setWalkInMatches] = useState([]); 
      const [currentTime, setCurrentTime] = useState(new Date());

      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 60000);
        return () => clearInterval(timer);
      }, []);

      const [distributionData, setDistributionData] = useState({ companies: {}, buyers: {} });

      const [liveSubTab, setLiveSubTab] = useState('list');
      const [currentLiveDayIdx, setCurrentLiveDayIdx] = useState(0);
      const [currentLiveTime, setCurrentLiveTime] = useState('');
      const [isFloorEditMode, setIsFloorEditMode] = useState(false);
      const [tableAssignModal, setTableAssignModal] = useState({ isOpen: false, x: 0, y: 0, type: 'company', targetId: '' });
      const [resultModal, setResultModal] = useState({ isOpen: false, dayIdx: 0, time: '', companyId: '', data: {} });

      const [mailConfig, setMailConfig] = useState({

          if (bulkMode === 'overwrite') { setCompanies(newCos); setMatches({ 0: {} }); showAlert('초기화 안내', '기업 목록이 초기화되었습니다.'); } 
          else setCompanies([...companies, ...newCos]);

        } else if (bulkModal.type === 'buyers') {
          // ... (기존 바이어 로직 유지)
          const newBuyers = rows.map(r => {
            const cols = r.split('\t');
            return { id: `b_${Date.now()}_${Math.random()}`, country: cols[0]?.trim() || '', company: cols[1]?.trim() || '', name: cols[2]?.trim() || '', field: cols[3]?.trim() || '', desiredCompaniesText: cols[4]?.trim() || '', availableDaysText: cols[5]?.trim() || '', email: cols[6]?.trim() || '', phone: cols[7]?.trim() || '' };
          });
          if (bulkMode === 'overwrite') { setBuyers(newBuyers); setMatches({ 0: {} }); showAlert('초기화 안내', '바이어 목록이 초기화되었습니다.'); } 
          else setBuyers([...buyers, ...newBuyers]);

        } else if (bulkModal.type === 'accounts') {
          // 🌟 [추가] 계정 엑셀 대량 등록 로직
          let newAccounts = [...accountsDB];
          let errorLog = [];
          
          rows.forEach((r, idx) => {
              const cols = r.split('\t').map(s => s.trim());
              if (cols.length < 3) return; 
              
              const targetEventName = cols[0];
              const accId = cols[1];
              const accPw = cols[2];
              const targetName = cols[3] || '';

              if (!accId || !accPw) return;

              // 1. 행사 찾기
              const ev = Object.values(eventsDB).find(e => e.eventName === targetEventName);
              if (!ev) {
                  errorLog.push(`${idx + 1}행: 행사명('${targetEventName}')을 찾을 수 없습니다.`);
                  return;
              }

              // 2. 타겟(바이어/기업) 찾기 및 권한 결정
              let targetType = null;
              let targetIdStr = null;
              let role = 'client'; // 기본은 발주처

              if (targetName) {
                  const comp = (ev.companies || []).find(c => c.name === targetName);
                  const buyer = (ev.buyers || []).find(b => b.company === targetName || b.name === targetName);
                  
                  if (comp) { targetType = 'company'; targetIdStr = comp.id; role = 'interpreter'; } 
                  else if (buyer) { targetType = 'buyer'; targetIdStr = buyer.id; role = 'interpreter'; } 
                  else { errorLog.push(`${idx + 1}행: 배정대상('${targetName}')을 찾을 수 없어 발주처 권한으로만 등록됩니다.`); }
              }

              // 3. 기존 계정 덮어쓰기 or 새 계정 생성
              const existingIdx = newAccounts.findIndex(a => a.username === accId);
              if (existingIdx >= 0) {
                  const existing = newAccounts[existingIdx];
                  existing.password = accPw;
                  if (role === 'interpreter') existing.role = 'interpreter';
                  if (!existing.assignedEvents) existing.assignedEvents = [];
                  if (!existing.assignedEvents.includes(ev.id)) existing.assignedEvents.push(ev.id);
                  if (!existing.assignedTargets) existing.assignedTargets = {};
                  if (targetIdStr) existing.assignedTargets[ev.id] = { type: targetType, id: targetIdStr };
              } else {
                  newAccounts.push({
                      username: accId, password: accPw, role: role,
                      assignedEvents: [ev.id],
                      assignedTargets: targetIdStr ? { [ev.id]: { type: targetType, id: targetIdStr } } : {}
                  });
              }
          });

          saveAccounts(newAccounts);
          if (errorLog.length > 0) showAlert('일부 등록 실패/안내', `계정이 등록/수정되었으나 다음 문제가 있었습니다:\n\n${errorLog.join('\n')}`);
          else showAlert('대량 등록 완료', '계정이 성공적으로 엑셀 대량 등록되었습니다.');
        }

        setBulkModal({ isOpen: false, type: '' });
        setBulkText('');
      };

      const openMatchModal = (dayIdx, time, companyId) => setMatchModal({ isOpen: true, dayIdx, time, companyId, searchQuery: '' });

      const setMatch = (buyerId) => {
        const { dayIdx, time, companyId } = matchModal;
        setMatches(prev => {
          const newMatches = { ...prev };
          if (!newMatches[dayIdx]) newMatches[dayIdx] = {};
          if (!newMatches[dayIdx][time]) newMatches[dayIdx][time] = {};
          if (buyerId) newMatches[dayIdx][time][companyId] = buyerId;
          else delete newMatches[dayIdx][time][companyId];
          return newMatches;
        });
        setMatchModal({ ...matchModal, isOpen: false });
      };

      const cancelAllMatchesForEntity = (type, targetId) => {
        const entityName = type === 'company' ? companies.find(c => c.id === targetId)?.name : buyers.find(b => b.id === targetId)?.company;
        showConfirm('모든 일정 취소', `[${entityName}]에 배정된 모든 미팅 일정을 정말 취소(초기화)하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`, () => {
          setMatches(prev => {
            const newMatches = JSON.parse(JSON.stringify(prev));
            Object.keys(newMatches).forEach(dayIdx => {

                else if (type === 'buyer') {

      const promptGlobalAutoMatch = (mode) => {
        const modeDesc = mode === 'spread' ? '시간을 넓게 분산시켜 여유롭게 배치합니다.' : '이른 시간부터 빈틈없이 꽉 채워서 몰아 배치합니다.';
        showConfirm('전체 자동 배정', `기존 일정은 그대로 유지하며, 빈 자리에 모든 바이어를 한 번에 자동 매칭하시겠습니까?\n\n[배치 방식: ${mode === 'spread' ? '분산형' : '밀집형'}]\n${modeDesc}\n\n(바이어별 희망 기업을 최우선으로 배정합니다.)`, () => {
          executeGlobalAutoMatch(mode);
        });
      };

      const executeGlobalAutoMatch = (mode) => {
        setDialog({ isOpen: true, type: 'alert', title: '⏳ 매칭 및 서버 저장 중...', message: '데이터를 계산하고 구글 시트에 안전하게 동기화하고 있습니다.\n(절대 새로고침 하지 마시고 약 2초만 기다려주세요)' });

        setMatches(prevMatches => {
          let newMatches = JSON.parse(JSON.stringify(prevMatches));
          let successCount = 0;

          const getBuyerAvailableDays = (b) => {
             if (!b.availableDaysText || !b.availableDaysText.trim()) return Array.from({length: config.days}, (_, i) => i);
             const days = b.availableDaysText.split(',').map(s => parseInt(s.trim()) - 1).filter(n => !isNaN(n) && n >= 0 && n < config.days);
             return days.length > 0 ? days : Array.from({length: config.days}, (_, i) => i);
          };

          const getTargetSlots = (availableDays) => {
              let allSlots = [];
              availableDays.forEach(d => { timeSlots.forEach(slot => { allSlots.push({ d, timeVal: slot.value }); }); });
              if (mode === 'spread') {
                for (let i = allSlots.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [allSlots[i], allSlots[j]] = [allSlots[j], allSlots[i]];
                }
              }
              return allSlots;
          };

          const getBuyerMatchCountLocal = (bId) => {
             let count = 0;
             for (let d = 0; d < config.days; d++) {
               for (let slot of timeSlots) {
                 const tM = newMatches[d]?.[slot.value] || {};
                 if (Object.values(tM).includes(bId)) count++;
               }
             }
             return count;
          };

          const isMatchedWith = (bId, cId) => {
             for (let d = 0; d < config.days; d++) {
               for (let slot of timeSlots) {
                 if (newMatches[d]?.[slot.value]?.[cId] === bId) return true;
               }
             }
             return false;
          };

          const assignSlot = (bId, cId, availableDays) => {
            if (isMatchedWith(bId, cId)) return false; 
            const slots = getTargetSlots(availableDays);
            for (let {d, timeVal} of slots) {
              if (!newMatches[d]) newMatches[d] = {};
              if (!newMatches[d][timeVal]) newMatches[d][timeVal] = {};
              const tM = newMatches[d][timeVal];
              if (!tM[cId] && !Object.values(tM).includes(bId)) {
                 newMatches[d][timeVal][cId] = bId;
                 return true;
              }
            }
            return false;
          };

          buyers.forEach(buyer => {
            const availableDays = getBuyerAvailableDays(buyer);
            const desiredNames = (buyer.desiredCompaniesText || '').split(',').map(s=>s.trim()).filter(Boolean);
            const desiredIds = [];
            
            desiredNames.forEach(name => {
               const c = companies.find(comp => comp.name.toLowerCase().includes(name.toLowerCase()));
               if (c && !desiredIds.includes(c.id)) desiredIds.push(c.id);
            });

            desiredIds.forEach(cId => { if(assignSlot(buyer.id, cId, availableDays)) successCount++; });

            let currentCount = getBuyerMatchCountLocal(buyer.id);
            const minMatches = config.minMatches !== undefined ? config.minMatches : 3;
            
            if (currentCount < minMatches) {
               let availableCompanies = companies.filter(c => {
                 if (isMatchedWith(buyer.id, c.id)) return false;
                 if (buyer.field && c.field && buyer.field !== c.field) return false;
                 return true;
               });
               
               availableCompanies.sort((a, b) => {
                 const scoreA = (buyer.field && a.field === buyer.field) ? 1 : 0;
                 const scoreB = (buyer.field && b.field === buyer.field) ? 1 : 0;
                 if (scoreA !== scoreB) return scoreB - scoreA;
                 return Math.random() - 0.5; 
               });

               for (let comp of availableCompanies) {
                 if (currentCount >= minMatches) break; 
                 if (assignSlot(buyer.id, comp.id, availableDays)) { currentCount++; successCount++; }
               }
            }
          });

          setTimeout(() => {
              setEventsDB(prevDB => {
                  const currentEvent = prevDB[eventId] || {};
                  const finalData = { ...currentEvent, matches: newMatches, lastModified: Date.now() };
                  const updatedDB = { ...prevDB, [eventId]: finalData };
                  forceSaveToCloud(updatedDB); // action: save_events로만 감
                  return updatedDB;
              });
              showAlert('✅ 매칭 및 서버 저장 완료!', `자동 배정이 성공적으로 동기화되었습니다!`);
          }, 2200);

          return newMatches;
        });
      };

      const handleLogin = (e) => {
          e.preventDefault();
          const { id, pw } = loginInput;
          let newUser = null;
          const userAcc = accountsRef.current.find(a => a.username === id && a.password === pw);
          
          if (userAcc) {
              newUser = { id, role: userAcc.role || 'client', assignedTargets: userAcc.assignedTargets || {} };
              setLoginUser(newUser);
              setLoginError('');
              if ((userAcc.role || 'client') !== 'admin' && !userAcc.assignedEvents?.includes(eventId)) {
                  if (userAcc.assignedEvents && userAcc.assignedEvents.length > 0) switchEvent(userAcc.assignedEvents[0]);
                  else { setEventId(''); setEventName('접근 가능한 행사가 없습니다.'); }
              }
          } else if (id === 'Bridging' && pw === 'bridging1004!!' && !accountsRef.current.find(a => a.username === 'Bridging')) {
              newUser = { id, role: 'admin' };
              setLoginUser(newUser);
              setLoginError('');
          } else {

              return;
          }

          if (newUser) {
              if (rememberId || autoLogin) localStorage.setItem('b2b_saved_id', id);
              else localStorage.removeItem('b2b_saved_id');
              localStorage.setItem('b2b_remember_id', rememberId);
              localStorage.setItem('b2b_auto_login', autoLogin);
              if (autoLogin) localStorage.setItem('b2b_user_session', JSON.stringify(newUser));
              else localStorage.removeItem('b2b_user_session');

              if (newUser.role === 'client') setActiveTab('stats');
              else if (newUser.role === 'interpreter') setActiveTab('interpreter_schedule');
              else setActiveTab('setup');
          }
      };

      const handleLogout = () => {
          setLoginUser(null);
          setLoginInput({ id: rememberId ? loginInput.id : '', pw: '' });
          localStorage.removeItem('b2b_auto_login');
          localStorage.removeItem('b2b_user_session');
          setAutoLogin(false);
      };

      const handleAutoLoginChange = (e) => {
          const checked = e.target.checked;
          setAutoLogin(checked);
          if (checked) setRememberId(true);
      };

      const addAccount = () => {
          if (!accForm.username || !accForm.password) return showAlert('오류', '아이디와 비밀번호를 입력해주세요.');
          if (accountsDB.some(a => a.username === accForm.username)) return showAlert('오류', '이미 존재하는 아이디입니다.');
          const newAccounts = [...accountsDB, { ...accForm, assignedEvents: [] }];
          saveAccounts(newAccounts);
          setAccForm({ username: '', password: '', role: 'client' });
          showAlert('완료', '새 계정이 생성되었습니다.');

      const deleteAccount = (username) => {
          showConfirm('계정 삭제', `[${username}] 계정을 삭제하시겠습니까?`, () => {

              saveAccounts(newAccounts);
              closeDialog();
          });
      };

      const toggleEventAssignment = (username, evId) => {
          const newAccounts = accountsDB.map(a => {
              if (a.username === username) {

                  const newAssigned = assigned.includes(evId) ? assigned.filter(id => id !== evId) : [...assigned, evId];
                  return { ...a, assignedEvents: newAssigned };

      const handleInterpreterAssignment = (username, evId, targetType, targetId) => {

              if (a.username === username) {

      const handleEditAcc = () => {

      // 💡 [수정] 포맷이 꼬여있던 현장 매칭 기록 삭제 함수를 깔끔하게 분리
      const deleteWalkInMatch = (wmOrId) => {
        if(confirm('이 현장 매칭 기록을 완전히 삭제하시겠습니까?')) {
            const newEv = JSON.parse(JSON.stringify(eventsDB[eventId]));
            
            // wm 객체가 오거나 id 문자열이 올 수 있도록 방어 코드 작성
            const wm = typeof wmOrId === 'string' 
                ? walkInMatches.find(w => w.id === wmOrId) 
                : wmOrId;

            if (!wm) return;
            
            if (wm.isFromMatches) {
              if (newEv.matches?.[wm.dayIdx]?.[wm.timeKey]?.[wm.companyId]) {
                delete newEv.matches[wm.dayIdx][wm.timeKey][wm.companyId];
              }
              if (newEv.liveStatus?.[wm.dayIdx]?.[wm.timeKey]) {
                delete newEv.liveStatus[wm.dayIdx][wm.timeKey];
              }
              if (newEv.meetingResults?.[wm.dayIdx]?.[wm.timeKey]) {
                delete newEv.meetingResults[wm.dayIdx][wm.timeKey];
              }
              if (newEv.onsiteMarks?.[wm.dayIdx]?.[wm.timeKey]) {
                delete newEv.onsiteMarks[wm.dayIdx][wm.timeKey];
              }
              
              newEv.companies = (newEv.companies || []).filter(c => c.id !== wm.companyId);
              newEv.buyers = (newEv.buyers || []).filter(b => b.id !== wm.buyerId);
              
            } else {
              newEv.walkInMatches = (newEv.walkInMatches || []).filter(w => w.id !== wm.id);
            }
            
            newEv.lastModified = Date.now();

          const settingsData = [
            ["Event Name", eventName],
            ["Event Date", mailConfig.eventDate || ""],
            ["Meeting Date", mailConfig.meetingDate || ""],
            ["Deadline", mailConfig.replyDeadline || ""],
            ["Admin Office", mailConfig.adminOffice || ""],
            ["Sender Name", mailConfig.senderName || ""],
            ["Subject Line", mailConfig.subjectLine || ""],
            ["Language", mailConfig.language || "KO"],
            ["Profile", mailConfig.buyerProfileLink || ""]
          ];
          const wsSettings = XLSX.utils.aoa_to_sheet(settingsData);
          XLSX.utils.book_append_sheet(wb, wsSettings, "Settings");

          const dataSheetHeaders = ["분류", "기업명", "담당자이름", "국가/부스번호", "관련/관심분야", "이메일", "연락처", "일정내용(텍스트)", "일정내용(HTML_표)", "발송결과 (Result)"];
          const dataSheetRows = [dataSheetHeaders];

          const buildSchedule = (entityId, type) => {
            let textResult = '';
            let htmlResult = '';
            
            config.dates.forEach((dateStr, dayIdx) => {
              textResult += `[${dayIdx + 1}일 차 (${dateStr})]\n`;
              let lastEndTime = null;
              
              timeSlots.forEach(slot => {
                const [start, end] = slot.value.split('~');
                
                if (lastEndTime && lastEndTime === config.lunchStart && start === config.lunchEnd) {
                  textResult += ` - ${config.lunchStart}~${config.lunchEnd} : ☕ 점심 및 휴식 시간\n`;
                  htmlResult += `<tr style="background-color: #fff7ed;"><td colspan="4" style="padding: 10px; border: 1px solid #e2e8f0; text-align: center; font-weight: bold; color: #c2410c;">☕ 점심 및 휴식 시간 (${config.lunchStart} ~ ${config.lunchEnd})</td></tr>`;
                }
                lastEndTime = end;

                const timeMatches = matches[dayIdx]?.[slot.value] || {};
                let opponentStrText = '일정 없음';
                let opponentStrHtmlName = '일정 없음';
                let opponentStrHtmlDesc = '-';

                if (type === 'company') {
                  const bId = timeMatches[entityId];
                  if (bId) {
                    const b = buyers.find(bx => bx.id === bId);
                    if(b) {
                      opponentStrText = `${b.company} (${b.name}) / ${b.country}`;
                      opponentStrHtmlName = `${b.company} (${b.name})`;
                      opponentStrHtmlDesc = b.country;
                    }
                  }
                } else {
                  const cId = Object.keys(timeMatches).find(cid => timeMatches[cid] === entityId);
                  if (cId) {
                    const c = companies.find(cx => cx.id === cId);
                    if(c) {
                      opponentStrText = `${c.name} / 부스: ${c.booth}`;
                      opponentStrHtmlName = c.name;
                      opponentStrHtmlDesc = `부스: ${c.booth}`;
                    }
                  }
                }

                textResult += ` - ${slot.value} : ${opponentStrText}\n`;
                const shortDate = dateStr.substring(5); 
                htmlResult += `<tr style="background-color: #ffffff;">
                  <td style="padding: 10px; border: 1px solid #e2e8f0; text-align: center; background-color: #f8fafc;">${shortDate}</td>
                  <td style="padding: 10px; border: 1px solid #e2e8f0; text-align: center;">${slot.value}</td>
                  <td style="padding: 10px; border: 1px solid #e2e8f0; text-align: center; font-weight: bold; ${opponentStrHtmlName !== '일정 없음' ? 'color: #1e40af;' : 'color: #9ca3af;'}">${opponentStrHtmlName}</td>
                  <td style="padding: 10px; border: 1px solid #e2e8f0; text-align: center; ${opponentStrHtmlName !== '일정 없음' ? '' : 'color: #9ca3af;'}">${opponentStrHtmlDesc}</td>
                </tr>`;
              });
            });
            return { text: textResult.trim(), html: htmlResult };
          };

          companies.forEach(c => {
             const schedule = buildSchedule(c.id, 'company');
             dataSheetRows.push([ "기업", c.name, c.name, c.booth, c.field, c.email, c.phone, schedule.text, schedule.html, "" ]);
          });

          buyers.forEach(b => {
             const schedule = buildSchedule(b.id, 'buyer');
             dataSheetRows.push([ "바이어", b.company, b.name, b.country, b.field, b.email, b.phone, schedule.text, schedule.html, "" ]);
          });

          const wsData = XLSX.utils.aoa_to_sheet(dataSheetRows);
          XLSX.utils.book_append_sheet(wb, wsData, "Data");

          XLSX.writeFile(wb, `B2B_Mailing_Data_${getToday()}.xlsx`);
          showAlert('다운로드 완료', '자동 메일링용 엑셀 파일이 다운로드되었습니다.');
        } catch (error) {
          console.error(error);
          showAlert('오류', '엑셀 파일 생성 중 오류가 발생했습니다.');
        }
      };

}`;

        let totalMeetings = 0; 
        const buyerTimeMatch = {}; 
        buyers.forEach(b => buyerTimeMatch[b.id] = {});

        config.dates.forEach((_, dayIdx) => {
          timeSlots.forEach(slot => {
            const timeMatches = matches[dayIdx]?.[slot.value] || {};
            const currentLiveStatuses = liveStatus[dayIdx]?.[slot.value] || {};
            
            Object.entries(timeMatches).forEach(([cId, bId]) => {
              // 💡 핵심 수정: 현재 목록에 존재하는 기업과 바이어인지 검증
              const isCompanyExist = companyCounts[cId] !== undefined;
              const isBuyerExist = buyerCounts[bId] !== undefined;

              // 둘 다 존재할 때만 통계 카운트 증가
              if (isCompanyExist && isBuyerExist) {
                companyCounts[cId]++;
                buyerCounts[bId]++;
                totalMeetings++; 
                
                if (buyerTimeMatch[bId]) {
                  const comp = companies.find(c => c.id === cId);
                  buyerTimeMatch[bId][`${dayIdx}_${slot.value}`] = {
                    name: comp.name, // 이미 존재함이 검증되었으므로 삭제된 기업 대비 불필요
                    status: currentLiveStatuses[cId] || 'waiting'
                  };
                }
              }
            });
          });
        });


        const validWalkInMatches = walkInMatches.filter(wm => 
          companies.some(c => c.id === wm.companyId) &&

        );
        const totalMatchesCount = totalMeetings + validWalkInMatches.length;

                    <tr>
                      <th className="p-2 sm:p-3 border-b border-r border-gray-200 text-gray-600 font-semibold sticky left-0 bg-gray-50 z-30 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] min-w-[150px] sm:min-w-[200px]">바이어 시간</th>

                            <div className="text-xs sm:text-sm">{slot.value}</div>
                          </th>
                        ))
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {buyers.map(b => (
                      <tr key={b.id} className="border-b border-gray-100 hover:bg-gray-50">
                        <td className="p-2 sm:p-3 font-medium text-gray-800 border-r border-gray-200 sticky left-0 bg-white z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] cursor-pointer hover:text-blue-600 break-keep text-xs sm:text-sm" onClick={() => setIndivEditModal({isOpen: true, type: 'buyer', targetId: b.id})} title="클릭하여 타임테이블 상세 보기">

                            else if (matchData?.status === 'completed') badgeClass = 'bg-blue-100 text-blue-700';
                            else if (matchData?.status === 'submitted') badgeClass = 'bg-teal-100 text-teal-700';

                            return (
                              <td key={`${dayIdx}-${slot.value}`} className="p-1 sm:p-2 text-center border-b border-r border-gray-100 hover:bg-gray-50 transition-colors">
                                {matchData ? (

                          </label>
                        )
                      })}
                      {Object.keys(eventsDB).length === 0 && <span className="text-gray-400 text-xs sm:text-sm p-2">생성된 행사가 없습니다.</span>}
                    </div>
                  </div>
                )}
                {isInterpreter && (
                  <div>
                    <p className="text-xs sm:text-sm font-bold text-gray-700 mb-2 sm:mb-3">이 계정에 배정할 기업 또는 바이어 선택 (행사별 1개 대상 배정)</p>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 sm:gap-3 max-h-60 overflow-y-auto p-2 bg-gray-50 rounded border custom-scrollbar">
                      {Object.values(eventsDB).map(ev => {
                        const assignedTarget = acc.assignedTargets?.[ev.id];
                        const selectValue = assignedTarget ? `${assignedTarget.type}_${assignedTarget.id}` : '';
                        return (
                          <div key={ev.id} className="flex flex-col p-2.5 sm:p-3 border rounded bg-white border-gray-200 shadow-sm">
                            <span className="font-bold text-gray-800 text-sm sm:text-base mb-2">{ev.eventName || '이름없는 행사'}</span>
                            <select
                              value={selectValue}
                              onChange={(e) => {
                                const val = e.target.value;
                                if (!val) handleInterpreterAssignment(acc.username, ev.id, null, null);
                                else {
                                  const [tType, ...rest] = val.split('_');
                                  const tId = rest.join('_');
                                  handleInterpreterAssignment(acc.username, ev.id, tType, tId);
                                }
                              }}
                              className="w-full p-2 border border-gray-300 rounded outline-none focus:border-green-500 text-sm"
                            >
                              <option value="">-- 배정 안 됨 --</option>
                              <optgroup label="국내 기업">
                                {(ev.companies || []).map(c => <option key={`company_${c.id}`} value={`company_${c.id}`}>{c.name}</option>)}
                              </optgroup>
                              <optgroup label="해외 바이어">
                                {(ev.buyers || []).map(b => <option key={`buyer_${b.id}`} value={`buyer_${b.id}`}>{b.company} ({b.name})</option>)}
                              </optgroup>
                            </select>
                          </div>
                        );
                      })}
                      {Object.keys(eventsDB).length === 0 && <span className="text-gray-400 text-xs sm:text-sm p-2">생성된 행사가 없습니다.</span>}
                    </div>
                  </div>
                )}
                {isAdmin && (
                  <p className="text-xs sm:text-sm text-gray-500 bg-gray-50 p-2 sm:p-3 rounded">💡 관리자 계정은 시스템의 모든 행사에 접근하고, 새로운 행사를 생성하거나 삭제할 수 있습니다.</p>
                )}
              </div>
            )})}
            {accountsDB.length === 0 && <p className="text-center text-gray-500 py-10 bg-gray-50 rounded border border-dashed">등록된 계정이 없습니다.</p>}
          </div>
        </div>
      );

      const renderInterpreterTab = () => {
        const targetInfo = loginUser?.assignedTargets?.[eventId];
        if (!targetInfo) {
            return (
                <div className="w-full bg-white p-6 sm:p-10 rounded-xl shadow border text-center text-gray-500 h-full flex flex-col items-center justify-center min-h-[300px]">
                    <IconAlertCircle size={48} className="mb-4 text-gray-400 w-10 h-10" />
                    <h2 className="text-xl font-bold text-gray-700 mb-2">배정된 일정이 없습니다.</h2>
                    <p>이 행사에서 회원님에게 배정된 대상이 없습니다.</p>
                </div>
            );
        }

        const isComp = targetInfo.type === 'company';
        const target = isComp ? companies.find(c => c.id === targetInfo.id) : buyers.find(b => b.id === targetInfo.id);

        if (!target) {
            return <div className="p-6 text-center text-gray-500">배정된 대상을 찾을 수 없습니다. (삭제되었을 수 있습니다)</div>;
        }

        const todayStr = getToday();
        const todayIdx = config.dates.findIndex(d => d === todayStr);
        const currentHHMM = currentTime.getHours().toString().padStart(2, '0') + ':' + currentTime.getMinutes().toString().padStart(2, '0');
        
        let nextMeeting = null;
        let remainingMeetingsCount = 0;
        let timeToNext = '';

        if (todayIdx !== -1) {
            timeSlots.forEach(slot => {
                const [start, end] = slot.value.split('~');
                const opponentId = isComp 
                    ? matches[todayIdx]?.[slot.value]?.[target.id] 
                    : Object.keys(matches[todayIdx]?.[slot.value] || {}).find(cid => matches[todayIdx][slot.value][cid] === target.id);

                if (opponentId) {
                    if (start > currentHHMM) {
                        if (!nextMeeting) {
                            nextMeeting = { time: slot.value, start, opponentId };
                            const [curH, curM] = currentHHMM.split(':').map(Number);
                            const [startH, startM] = start.split(':').map(Number);
                            const diffMins = (startH * 60 + startM) - (curH * 60 + curM);
                            if (diffMins > 0) {
                                const h = Math.floor(diffMins / 60);
                                const m = diffMins % 60;
                                timeToNext = h > 0 ? `${h}시간 ${m}분 후 시작` : `${m}분 후 시작`;
                            }
                        }
                        remainingMeetingsCount++;
                    } else if (end > currentHHMM && start <= currentHHMM) {
                        if (!nextMeeting) nextMeeting = { time: slot.value, inProgress: true, opponentId };
                    }
                }
            });
        }

            if (!walkInForm.companyId && !isComp) return showAlert('알림', '현장 매칭을 진행한 국내 기업을 선택해주세요.');
            
            const newRecord = {
                id: walkInForm.id || `wm_${Date.now()}`,
                time: walkInForm.id ? (walkInMatches.find(w=>w.id===walkInForm.id)?.time || currentTime.toLocaleTimeString().slice(0, -3)) : currentTime.toLocaleTimeString().slice(0, -3),
                companyId: isComp ? target.id : walkInForm.companyId,
                buyerId: !isComp ? target.id : walkInForm.buyerId,
                buyerName: !isComp ? target.company : buyers.find(b=>b.id === walkInForm.buyerId)?.company,
                result: {
                    suitability: walkInForm.suitability,
                    content: walkInForm.content,
                    consultAmount: walkInForm.consultAmount,
                    promoAmount: walkInForm.promoAmount,
                    contractAmount: walkInForm.contractAmount
                }
            };

            if (walkInForm.id) {
                setWalkInMatches(prev => prev.map(w => w.id === walkInForm.id ? newRecord : w));
                showAlert('수정 완료', '현장 매칭 기록이 수정되었습니다.');
            } else {
                setWalkInMatches(prev => [...prev, newRecord]);
                showAlert('저장 완료', '현장 매칭 기록이 추가되었습니다.');
            }
            setWalkInForm({ id: null, search: '', companyId: '', buyerId: !isComp ? target.id : '', suitability: '', content: '', consultAmount: '', promoAmount: '', contractAmount: '' });

                            <IconCalendarDays size={16} className="mr-1" /> 오늘의 다음 미팅
                        </span>
                        {todayIdx === -1 ? (
                            <span className="text-xl font-bold">오늘은 행사가 예정되어 있지 않습니다.</span>
                        ) : nextMeeting ? (
                            <div>
                                <span className="text-2xl sm:text-3xl font-bold block mb-1">
                                    {nextMeeting.time} {nextMeeting.inProgress && <span className="text-sm bg-red-500 px-2 py-1 rounded-full animate-pulse ml-2">현재 진행중</span>}
                                </span>
                                {timeToNext && <div className="text-sm bg-white/20 inline-block px-2 py-0.5 rounded font-bold mb-2 mr-2 animate-pulse">{timeToNext}</div>}
                                {nextMeeting.opponentId && (() => {
                                    const op = isComp ? buyers.find(b=>b.id === nextMeeting.opponentId) : companies.find(c=>c.id === nextMeeting.opponentId);
                                    return <span className="text-sm bg-black/20 px-2 py-1 rounded inline-block">상대: {isComp ? `${op?.company} (${op?.name})` : `${op?.name} (부스:${op?.booth})`}</span>
                                })()}
                            </div>
                        ) : (
                            <span className="text-xl font-bold">오늘 예정된 남은 미팅이 없습니다 🎉</span>

                    </div>
                    <div className="bg-white border border-gray-200 p-5 sm:p-6 rounded-xl shadow-sm flex flex-col justify-center relative overflow-hidden">
                        <div className="absolute right-0 top-0 opacity-5">
                           <IconUsers size={120} />
                        </div>
                        <span className="text-gray-500 font-bold mb-1 text-sm">오늘 남은 대기 미팅 수</span>
                        <div className="text-4xl sm:text-5xl font-extrabold text-gray-800">
                            {remainingMeetingsCount}<span className="text-lg text-gray-500 font-medium ml-1">건</span>
                        </div>
                    </div>
                </div>

                <div className="bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-gray-200 w-full overflow-hidden">

                            <IconCalendarDays className="mr-2 text-green-600" size={24} /> 내 담당 사전 스케줄
                        </h2>
                        <p className="text-sm text-gray-600 mt-2">
                            담당 대상: <strong className="text-gray-900 bg-green-50 px-2 py-1 rounded border border-green-200">{isComp ? `${target.name} (기업)` : `${target.company} - ${target.name} (바이어)`}</strong>
                        </p>
                    </div>

                        <table className="w-full text-sm text-left min-w-[500px]">
                            <thead className="bg-gray-50 border-b border-gray-200 sticky top-0 shadow-sm z-10">
                                <tr>
                                    <th className="p-2 sm:p-3 w-20 sm:w-24 text-center">날짜</th>
                                    <th className="p-2 sm:p-3 w-24 sm:w-32 text-center">시간</th>
                                    <th className="p-2 sm:p-3">{isComp ? '매칭된 바이어' : '매칭된 기업'}</th>
                                    <th className="p-2 sm:p-3 w-28 sm:w-32 text-center">진행 상태</th>
                                    <th className="p-2 sm:p-3 w-24 sm:w-28 text-center">결과 관리</th>
                                </tr>
                            </thead>
                            <tbody>
                                {config.dates.map((dateStr, dayIdx) => {
                                    let lastEndTime = null;
                                    return (
                                        <React.Fragment key={dayIdx}>
                                            <tr className="bg-gray-200 border-b border-gray-300">
                                                <td colSpan="5" className="p-2 sm:p-3 text-center font-bold text-gray-800 shadow-sm">{dayIdx + 1}일 차 ({dateStr})</td>
                                            </tr>
                                            {timeSlots.map(slot => {
                                                const [start, end] = slot.value.split('~');
                                                const isLunchNext = lastEndTime && lastEndTime === config.lunchStart && start === config.lunchEnd;
                                                lastEndTime = end;

                                                const timeMatches = matches[dayIdx]?.[slot.value] || {};
                                                let currentVal = '';
                                                let cIdForStatus = null;
                                                if (isComp) {
                                                    currentVal = timeMatches[target.id] || '';
                                                    cIdForStatus = target.id;
                                                } else {
                                                    currentVal = Object.keys(timeMatches).find(cid => timeMatches[cid] === target.id) || '';
                                                    cIdForStatus = currentVal;
                                                }

                                                let readOnlyText = '일정 없음';
                                                if (currentVal) {
                                                    if (isComp) {
                                                        const b = buyers.find(bx => bx.id === currentVal);
                                                        readOnlyText = b ? `${b.company} (${b.name}) - ${b.country}` : '일정 없음';
                                                    } else {
                                                        const c = companies.find(cx => cx.id === currentVal);
                                                        readOnlyText = c ? `${c.name} (부스: ${c.booth})` : '일정 없음';
                                                    }
                                                }

                                                return (
                                                    <React.Fragment key={slot.value}>
                                                        {isLunchNext && (
                                                            <tr className="bg-orange-50 border-y border-orange-200">
                                                                <td colSpan="5" className="p-2 text-center font-bold text-orange-700 tracking-wide text-xs">☕ 점심 및 휴식 시간 ({config.lunchStart} ~ {config.lunchEnd})</td>
                                                            </tr>
                                                        )}
                                                        <tr className={`border-b border-gray-100 hover:bg-green-50/30 transition-colors ${start <= currentHHMM && end > currentHHMM && todayIdx === dayIdx ? 'bg-green-50/50' : ''}`}>
                                                            <td className="p-2 sm:p-3 text-center font-medium">{dateStr}</td>
                                                            <td className="p-2 sm:p-3 text-center text-gray-600">{slot.value}</td>
                                                            <td className="p-2 sm:p-3">
                                                                <div className={`w-full p-2 border rounded font-medium text-center shadow-sm ${currentVal ? 'bg-green-50 border-green-200 text-green-800' : 'bg-gray-50 border-gray-200 text-gray-500'}`}>
                                                                    {readOnlyText}
                                                                </div>
                                                            </td>
                                                            <td className="p-2 sm:p-3 text-center">
                                                                {currentVal ? (
                                                                    <select
                                                                        value={liveStatus[dayIdx]?.[slot.value]?.[cIdForStatus] || 'waiting'}
                                                                        onChange={(e) => handleSpecificStatusChange(dayIdx, slot.value, cIdForStatus, e.target.value)}
                                                                        className="w-full text-xs sm:text-sm p-1.5 border border-gray-300 rounded outline-none focus:border-green-500 bg-white font-bold cursor-pointer"
                                                                    >
                                                                        <option value="waiting">⚪ 대기</option>
                                                                        <option value="in_progress">🟢 진행</option>
                                                                        <option value="completed">✅ 완료</option>
                                                                        <option value="delayed">⏳ 연기</option>
                                                                        <option value="canceled">❌ 취소</option>
                                                                    </select>
                                                                ) : <span className="text-gray-300">-</span>}
                                                            </td>
                                                            <td className="p-2 sm:p-3 text-center">
                                                                {currentVal ? (
                                                                    <button
                                                                        onClick={() => openResultModal(dayIdx, slot.value, cIdForStatus)}
                                                                        className="px-2 py-1.5 bg-blue-50 text-blue-700 border border-blue-200 rounded text-[10px] sm:text-xs font-bold hover:bg-blue-100 transition whitespace-nowrap"
                                                                    >결과 입력</button>
                                                                ) : <span className="text-gray-300">-</span>}
                                                            </td>
                                                        </tr>
                                                    </React.Fragment>
                                                );
                                            })}
                                        </React.Fragment>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>

                <div className="bg-red-50 p-4 sm:p-6 rounded-xl shadow-sm border border-red-200 w-full mb-10">
                    <div className="mb-4 border-b border-red-200 pb-3 flex justify-between items-center">
                        <h2 className="text-lg sm:text-xl font-bold flex items-center text-red-800">
                            <IconPlus className="mr-2" size={24} /> {walkInForm.id ? '돌발 / 현장 매칭 수정하기' : '돌발 / 현장 매칭 추가 기록'}
                        </h2>
                        {walkInForm.id && (
                            <button onClick={() => setWalkInForm({ id: null, search: '', companyId: '', buyerId: !isComp ? target.id : '', suitability: '', content: '', consultAmount: '', promoAmount: '', contractAmount: '' })} className="text-sm font-bold text-red-600 bg-white px-3 py-1 rounded border border-red-200 shadow-sm">
                                작성 취소 (신규 등록으로 전환)
                            </button>
                        )}
                    </div>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                        <div className="space-y-4">
                            <div className="bg-white p-3 rounded border border-red-100">
                                <label className="block text-xs font-bold text-gray-500 mb-1">담당 바이어 (고정)</label>
                                <div className="font-bold text-lg text-gray-800">{!isComp ? `${target.company} (${target.name})` : '-'}</div>
                            </div>

                            {!isComp && (
                                <div className="space-y-2">
                                    <label className="block text-sm font-bold text-gray-800">매칭된 국내 기업 검색 및 선택</label>
                                    <div className="flex gap-2">
                                        <div className="relative flex-1">
                                            <IconSearch size={16} className="absolute left-3 top-3 text-gray-400" />
                                            <input 
                                                type="text" 
                                                placeholder="기업명 또는 부스번호 검색..." 
                                                value={walkInForm.search}
                                                onChange={(e) => setWalkInForm({...walkInForm, search: e.target.value})}
                                                className="w-full p-2 pl-9 border border-gray-300 rounded-lg outline-none focus:border-red-500"
                                            />
                                        </div>
                                    </div>
                                    <select 
                                        size="4"
                                        value={walkInForm.companyId}
                                        onChange={e=>setWalkInForm({...walkInForm, companyId: e.target.value})} 
                                        className="w-full p-2 border border-gray-300 rounded-lg outline-none focus:border-red-500 bg-white"
                                    >
                                        <option value="" disabled>-- 아래에서 기업을 선택하세요 --</option>
                                        {filteredCompanies.map(c => <option key={c.id} value={c.id}>{c.name} (부스: {c.booth})</option>)}
                                    </select>
                                </div>
                            )}
                        </div>

                        <div className="space-y-3 bg-white p-4 rounded-xl border border-red-100 shadow-sm">
                            <h4 className="font-bold text-gray-700 text-sm border-b pb-2">현장 상담 결과 입력</h4>
                            <div>
                                <select value={walkInForm.suitability} onChange={e=>setWalkInForm({...walkInForm, suitability: e.target.value})} className="w-full p-2 border border-gray-300 rounded outline-none focus:border-red-500 text-sm">
                                    <option value="">적합도 선택 (매우우수 / 우수 / 보통 / 미흡)</option>
                                    <option value="매우 우수">매우 우수</option><option value="우수">우수</option><option value="보통">보통</option><option value="미흡">미흡</option>
                                </select>
                            </div>
                            <textarea 
                                value={walkInForm.content} onChange={e=>setWalkInForm({...walkInForm, content: e.target.value})} 
                                className="w-full p-2 border border-gray-300 rounded outline-none focus:border-red-500 text-sm h-16 resize-none" 
                                placeholder="상담 내용 요약..."
                            />
                            <div className="grid grid-cols-3 gap-2">
                                <input type="text" value={walkInForm.consultAmount} onChange={e=>setWalkInForm({...walkInForm, consultAmount: e.target.value})} placeholder="상담액" className="w-full p-2 border border-gray-300 rounded text-sm" />
                                <input type="text" value={walkInForm.promoAmount} onChange={e=>setWalkInForm({...walkInForm, promoAmount: e.target.value})} placeholder="추진액" className="w-full p-2 border border-gray-300 rounded text-sm" />
                                <input type="text" value={walkInForm.contractAmount} onChange={e=>setWalkInForm({...walkInForm, contractAmount: e.target.value})} placeholder="계약액" className="w-full p-2 border border-gray-300 rounded text-sm" />
                            </div>
                            <button onClick={handleWalkInSubmit} className={`w-full mt-2 py-3 text-white font-bold rounded-lg shadow-sm transition ${walkInForm.id ? 'bg-orange-500 hover:bg-orange-600' : 'bg-red-600 hover:bg-red-700'}`}>
                                {walkInForm.id ? '수정된 내용 저장하기' : '현장 매칭 결과 새로 등록'}
                            </button>

                    </div>

                                <tr>
                                    <th className="p-3 font-semibold text-center w-24">등록 시간</th>

                  <div className="bg-white p-6 rounded-xl shadow-sm border border-blue-200">
                    <h4 className="font-bold text-lg text-blue-800 mb-2 flex items-center">
                      <IconSave className="mr-2" /> 안전한 PC 파일 백업 (무료 & 영구보관)
                    </h4>
                    <p className="text-sm text-gray-600 mb-4">현재 작업 중인 모든 행사 데이터는 브라우저가 종료되면 초기화될 수 있습니다. <b>반드시 파일로 저장(백업)</b>하여 보관해 주세요.</p>
                    
                    <div className="flex flex-col sm:flex-row gap-4">
                      <button onClick={exportToJsonFile} className="flex-1 py-4 px-6 bg-blue-600 text-white font-bold rounded-xl shadow-md hover:bg-blue-700 transition flex items-center justify-center text-lg">
                        <IconDownload className="mr-2" size={24} /> 내 컴퓨터에 파일로 저장 (.json)
                      </button>
                      
                      <label className="flex-1 py-4 px-6 bg-gray-800 text-white font-bold rounded-xl shadow-md hover:bg-gray-900 transition flex items-center justify-center cursor-pointer text-lg">
                        <IconUpload className="mr-2" size={24} /> 백업 파일 불러오기 (.json)
                        <input type="file" accept=".json" onChange={importFromJsonFile} className="hidden" />
                      </label>
                    </div>
                  </div>

                  <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex-1 flex flex-col">
                    <div className="bg-gray-50 px-6 py-4 border-b flex justify-between items-center">
                      <h4 className="font-bold text-gray-800 text-lg">현재 임시 보관 중인 행사들</h4>
                      {loginUser?.role === 'admin' && (
                        <button onClick={createNewEvent} className="px-4 py-2 bg-green-600 text-white text-sm font-bold rounded-lg hover:bg-green-700 shadow-sm flex items-center">
                          <IconPlus size={16} className="mr-1" /> 새 빈 행사 만들기
                        </button>
                      )}
                    </div>
                    <div className="p-4 space-y-3 overflow-y-auto flex-1">
                      {Object.values(eventsDB)
                        .filter(ev => {
                            if (loginUser?.role === 'admin') return true;
                            const myAcc = accountsRef.current.find(a => a.username === loginUser?.id);
                            return myAcc?.assignedEvents?.includes(ev.id);
                        })
                        .sort((a,b) => (b.lastModified||0) - (a.lastModified||0))
                        .map(ev => {
                        const isCurrent = ev.id === eventId;
                        const modDate = new Date(ev.lastModified).toLocaleString();
                        return (
                          <div key={ev.id} className={`p-4 border rounded-xl flex flex-col sm:flex-row sm:justify-between sm:items-center bg-white transition-all gap-4 ${isCurrent ? 'border-blue-500 ring-2 ring-blue-100 shadow-md bg-blue-50/10' : 'border-gray-200 hover:border-gray-300'}`}>
                            <div>
                              <h4 className="font-bold text-gray-900 text-lg flex items-center flex-wrap">
                                {ev.eventName || '이름 없는 행사'}
                                {isCurrent && <span className="ml-3 px-2 py-0.5 bg-blue-100 text-blue-700 text-xs rounded-full font-bold whitespace-nowrap">현재 작업 중</span>}
                              </h4>
                              <div className="text-sm text-gray-500 mt-1">
                                기업 {ev.companies?.length || 0}개 · 바이어 {ev.buyers?.length || 0}명 · 수정: {modDate}
                              </div>
                            </div>
                            <div className="flex space-x-2 shrink-0">
                              {!isCurrent && (
                                <button onClick={() => switchEvent(ev.id)} className="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 shadow-sm transition">
                                  작업 전환
                                </button>
                              )}
                              {loginUser?.role === 'admin' && (
                                <button onClick={() => deleteEvent(ev.id)} className="px-3 py-2 bg-white text-red-500 border border-gray-200 text-sm font-medium rounded-lg hover:bg-red-50 hover:border-red-200 transition">
                                  삭제
                                </button>
                              )}
                            </div>
                          </div>
                        )
                      })}
                      {Object.values(eventsDB).filter(ev => loginUser?.role === 'admin' || accountsRef.current.find(a => a.username === loginUser?.id)?.assignedEvents?.includes(ev.id)).length === 0 && <p className="text-center text-gray-500 py-10">보관 중인 데이터가 없습니다.</p>}
                    </div>
                  </div>

                </div>
              </div>
            </div>
          )}

          {bulkModal.isOpen && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-3xl overflow-hidden flex flex-col">
                <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                  <h3 className="font-bold text-lg text-gray-800">엑셀 대량 등록 ({bulkModal.type === 'companies' ? '기업' : '바이어'})</h3>
                  <button onClick={() => setBulkModal({isOpen:false})} className="text-gray-500 hover:text-black"><IconX /></button>
                </div>
                <div className="p-6 flex-1">
                  <div className="mb-4 text-sm text-gray-600 bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <p className="font-bold text-blue-800 mb-3">💡 엑셀에서 복사 후 아래 칸에 그대로 붙여넣기 하세요.</p>
                    <div className="flex flex-col gap-3 mb-4 p-3 bg-white rounded border border-blue-200">
                      <div className="w-full flex flex-wrap items-center gap-4">
                        <span className="font-bold text-gray-700 text-xs w-16">등록 방식:</span>
                        <label className="flex items-center cursor-pointer font-bold text-gray-800 text-sm">
                          <input type="radio" checked={bulkMode === 'append'} onChange={() => setBulkMode('append')} className="mr-2 w-4 h-4 text-blue-600" />
                          기존 목록에 유지하며 추가하기
                        </label>
                        <label className="flex items-center cursor-pointer font-bold text-red-600 text-sm">
                          <input type="radio" checked={bulkMode === 'overwrite'} onChange={() => setBulkMode('overwrite')} className="mr-2 w-4 h-4 text-red-600" />
                          기존 목록 모두 지우고 새로 덮어쓰기
                        </label>
                      </div>
                    </div>
                    {bulkModal.type === 'companies' 
                      ? <p className="bg-gray-100 p-2 rounded">복사할 열 순서: <strong>기업명 | 부스번호 | 관련 분야 | 이메일 | 연락처</strong> (총 5열)</p>
                      : <p className="bg-gray-100 p-2 rounded">복사할 열 순서: <strong>국가 | 회사명 | 이름 | 관심 분야 | 희망기업(쉼표구분) | 참여가능일차(쉼표구분) | 이메일 | 연락처</strong> (총 8열)</p>
                    }
                  </div>
                  <textarea 
                    value={bulkText} onChange={e => setBulkText(e.target.value)}
                    placeholder="여기에 엑셀 데이터를 붙여넣기(Ctrl+V) 하세요..."
                    className="w-full h-64 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm whitespace-pre"
                  ></textarea>
                </div>
                <div className="p-4 border-t flex justify-end space-x-2 bg-gray-50">
                  <button onClick={() => setBulkModal({isOpen:false})} className="px-4 py-2 text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 font-medium text-sm">취소</button>
                  <button onClick={handleBulkSave} className="px-6 py-2 text-white bg-blue-600 rounded-lg hover:bg-blue-700 font-bold shadow-sm text-sm">등록/수정하기</button>
                </div>
              </div>
            </div>
          )}

          {myPwModal.isOpen && (
            <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col">
                <div className="p-4 border-b bg-gray-50 flex items-center">
                  <h3 className="font-bold text-lg text-gray-800">내 비밀번호 변경</h3>
                </div>
                <div className="p-6">
                  <label className="block text-sm font-bold text-gray-700 mb-2">새로운 비밀번호 입력</label>
                  <input type="text" value={myPwModal.newPw} onChange={e=>setMyPwModal({...myPwModal, newPw: e.target.value})} className="w-full p-3 border border-gray-300 rounded-lg outline-none focus:border-blue-500" placeholder="새 비밀번호" />
                </div>
                <div className="p-4 border-t bg-gray-50 flex justify-end space-x-2">
                  <button onClick={() => setMyPwModal({ isOpen: false, newPw: '' })} className="px-4 py-2 text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 font-medium text-sm">취소</button>
                  <button onClick={handleMyPwChange} className="px-6 py-2 text-white bg-blue-600 rounded-lg hover:bg-blue-700 font-bold shadow-sm text-sm">변경 저장</button>
                </div>
              </div>
            </div>
          )}

          {editPwAccModal.isOpen && (
            <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col">
                <div className="p-4 border-b bg-gray-50 flex items-center">
                  <h3 className="font-bold text-lg text-gray-800">[{editPwAccModal.username}] 비밀번호 변경</h3>
                </div>
                <div className="p-6">
                  <label className="block text-sm font-bold text-gray-700 mb-2">새로운 비밀번호</label>
                  <input type="text" value={editPwAccModal.newPw} onChange={e=>setEditPwAccModal({...editPwAccModal, newPw: e.target.value})} className="w-full p-3 border border-gray-300 rounded-lg outline-none focus:border-blue-500" placeholder="새 비밀번호 입력" />
                </div>
                <div className="p-4 border-t bg-gray-50 flex justify-end space-x-2">
                  <button onClick={() => setEditPwAccModal({ isOpen: false, username: '', newPw: '' })} className="px-4 py-2 text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 font-medium text-sm">취소</button>
                  <button onClick={handleEditAccPw} className="px-6 py-2 text-white bg-blue-600 rounded-lg hover:bg-blue-700 font-bold shadow-sm text-sm">변경 저장</button>
                </div>
              </div>
            </div>
          )}

          {matchModal.isOpen && (() => {
            const { dayIdx, time, companyId, searchQuery } = matchModal;
            const comp = companies.find(c => c.id === companyId);
            const currentBuyerId = matches[dayIdx]?.[time]?.[companyId];
            const currentBuyer = buyers.find(b => b.id === currentBuyerId);

            const filteredBuyers = buyers.filter(b => 
                b.company.toLowerCase().includes(searchQuery.toLowerCase()) || 
                b.name.toLowerCase().includes(searchQuery.toLowerCase())
            );

            return (
              <div className="fixed inset-0 bg-black/60 z-[115] flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                  <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                    <h3 className="font-bold text-lg text-gray-800">바이어 수동 배정 <span className="text-sm text-gray-500 font-normal ml-2">{comp?.name} ({time})</span></h3>
                    <button onClick={() => setMatchModal({...matchModal, isOpen: false})} className="text-gray-400 hover:text-black"><IconX /></button>
                  </div>
                  <div className="p-4 border-b bg-white">
                    <div className="relative">
                      <IconSearch size={18} className="absolute left-3 top-3 text-gray-400" />
                      <input 
                        type="text" 
                        placeholder="바이어 소속사 또는 담당자 이름 검색..." 
                        value={searchQuery}
                        onChange={e => setMatchModal({...matchModal, searchQuery: e.target.value})}
                        className="w-full p-2.5 pl-10 border border-gray-300 rounded-lg outline-none focus:border-blue-500 bg-gray-50 text-sm"
                        autoFocus
                      />
                    </div>
                  </div>
                  <div className="flex-1 overflow-y-auto p-4 custom-scrollbar bg-gray-50">
                    {currentBuyer && (
                        <div className="mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg flex justify-between items-center shadow-sm">
                            <div>
                                <span className="text-[10px] font-bold text-blue-600 block mb-0.5">현재 배정된 바이어</span>
                                <span className="font-bold text-gray-800 text-sm">{currentBuyer.company} ({currentBuyer.name})</span>
                            </div>
                            <button onClick={() => setMatch(null)} className="px-3 py-1.5 bg-white border border-red-200 text-red-600 font-bold rounded text-xs hover:bg-red-50 transition shadow-sm">
                                배정 취소
                            </button>
                        </div>
                    )}
                    <div className="space-y-2">
                        {filteredBuyers.map(buyer => {
                            const isBooked = Object.values(matches[dayIdx]?.[time] || {}).includes(buyer.id) && matches[dayIdx]?.[time]?.[companyId] !== buyer.id;
                            const isCurrentlyMatched = matches[dayIdx]?.[time]?.[companyId] === buyer.id;
                            
                            return (
                                <div key={buyer.id} className={`p-3 border rounded-lg flex justify-between items-center transition shadow-sm bg-white ${isBooked ? 'opacity-60 bg-gray-100' : 'hover:border-blue-300'}`}>
                                    <div>
                                        <div className="font-bold text-gray-800 text-sm">{buyer.company}</div>
                                        <div className="text-[11px] text-gray-500 mt-0.5">{buyer.name} · {buyer.country} {buyer.field ? `· ${buyer.field}` : ''}</div>
                                        {isBooked && <div className="text-[10px] font-bold text-red-500 mt-1">⚠️ 이 시간에 다른 기업과 이미 매칭됨</div>}
                                    </div>
                                    {!isBooked && !isCurrentlyMatched && (
                                        <button onClick={() => setMatch(buyer.id)} className="px-3 py-1.5 bg-blue-600 text-white font-bold rounded text-xs hover:bg-blue-700 transition shrink-0 ml-2 shadow-sm">
                                            배정하기
                                        </button>
                                    )}
                                    {isCurrentlyMatched && (
                                        <span className="text-xs font-bold text-blue-600 px-2 bg-blue-50 rounded py-1">현재 배정됨</span>
                                    )}
                                </div>
                            );
                        })}
                        {filteredBuyers.length === 0 && <div className="text-center text-gray-400 py-8 text-sm">검색된 바이어가 없습니다.</div>}
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}

          {resultModal.isOpen && (
            <div className="fixed inset-0 bg-black/60 z-[120] flex items-center justify-center p-4">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
                <div className="p-4 border-b bg-gray-50 flex items-center justify-between">
                  <h3 className="font-bold text-lg text-gray-800">미팅 결과 입력</h3>
                  <button onClick={() => setResultModal({...resultModal, isOpen: false})} className="text-gray-400 hover:text-black"><IconX /></button>
                </div>
                <div className="p-5 overflow-y-auto space-y-4 text-sm custom-scrollbar">
                   <div>
                      <label className="block font-bold mb-1 text-gray-700">매칭 적합도 (선택)</label>
                      <select value={resultModal.data.suitability} onChange={e=>setResultModal(m=>({...m, data:{...m.data, suitability: e.target.value}}))} className="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:border-blue-500 bg-white">
                          <option value="">선택하세요</option>
                          <option value="매우 우수">매우 우수</option>
                          <option value="우수">우수</option>
                          <option value="보통">보통</option>
                          <option value="미흡">미흡</option>
                      </select>
                   </div>
                   <div>
                      <label className="block font-bold mb-1 text-gray-700">미팅 내용 (단답형)</label>
                      <textarea value={resultModal.data.content} onChange={e=>setResultModal(m=>({...m, data:{...m.data, content: e.target.value}}))} className="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:border-blue-500 h-20 resize-none" placeholder="간략한 상담 내용 입력"></textarea>
                   </div>
                   <div>
                      <label className="block font-bold mb-1 text-gray-700">상담 금액</label>
                      <input type="text" value={resultModal.data.consultAmount} onChange={e=>setResultModal(m=>({...m, data:{...m.data, consultAmount: e.target.value}}))} className="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:border-blue-500" placeholder="예: 10,000 USD" />
                   </div>
                   <div>
                      <label className="block font-bold mb-1 text-gray-700">계약 추진 금액</label>
                      <input type="text" value={resultModal.data.promoAmount} onChange={e=>setResultModal(m=>({...m, data:{...m.data, promoAmount: e.target.value}}))} className="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:border-blue-500" placeholder="예: 5,000 USD" />
                   </div>
                   <div>
                      <label className="block font-bold mb-1 text-gray-700">계약액</label>
                      <input type="text" value={resultModal.data.contractAmount} onChange={e=>setResultModal(m=>({...m, data:{...m.data, contractAmount: e.target.value}}))} className="w-full p-2.5 border border-gray-300 rounded-lg outline-none focus:border-blue-500" placeholder="예: 1,000 USD" />
                   </div>
                </div>
                <div className="p-4 border-t bg-gray-50 flex justify-end space-x-2">
                  <button onClick={() => setResultModal({...resultModal, isOpen: false})} className="px-4 py-2 text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 font-medium">취소</button>
                  <button onClick={saveMeetingResult} className="px-6 py-2 text-white bg-blue-600 rounded-lg hover:bg-blue-700 font-bold shadow-sm">저장</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
